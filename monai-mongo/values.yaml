## Operator
operator:
  # Name that will be assigned to most of internal Kubernetes objects like
  # Deployment, ServiceAccount, Role etc.
  name: mongodb-kubernetes-operator

  # Name of the operator image
  operatorImageName: mongodb-kubernetes-operator

  # Name of the deployment of the operator pod
  deploymentName: mongodb-kubernetes-operator

  # Version of mongodb-kubernetes-operator
  version: 0.7.8

  # Uncomment this line to watch all namespaces
  # watchNamespace: "*"

  # Resources allocated to Operator Pod
  resources:
    limits:
      cpu: 1100m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 200Mi

  # Additional environment variables
  extraEnvs: []
  # environment:
  # - name: CLUSTER_DOMAIN
  #   value: my-cluster.domain

## Operator's database
database:
  name: mongodb-database
  # set this to the namespace where you would like
  # to deploy the MongoDB database,
  # Note if the database namespace is not same
  # as the operator namespace,
  # make sure to set "watchNamespace" to "*"
  # to ensure that the operator has the
  # permission to reconcile resources in other namespaces
  # namespace: mongodb-database

agent:
  name: mongodb-agent
  version: 12.0.15.7646-1
versionUpgradeHook:
  name: mongodb-kubernetes-operator-version-upgrade-post-start-hook
  version: 1.0.6
readinessProbe:
  name: mongodb-kubernetes-readinessprobe
  version: 1.0.12
mongodb:
  name: mongo
  repo: docker.io

registry:
  agent: quay.io/mongodb
  versionUpgradeHook: quay.io/mongodb
  readinessProbe: quay.io/mongodb
  operator: quay.io/mongodb
  pullPolicy: Always

# Deploys MongoDB with `resource` attributes.
createResource: true
resource:
  name: mongodb
  version: 4.4.0
  members: 3
  adminPassword: mongodb
  extraUsers:
    - name: workflowuser
      password: monai
      db: WorkflowManager
    - name: miguser
      password: monai
      db: InformaticsGateway
  tls:
    enabled: false
  resources:
    mongod:
      limits:
        cpu: 1
        memory: 500M
      requests:
        cpu: 100m
        memory:  400M
    mongodbAgent:
      limits:
        cpu: 1
        memory: 500M
      requests:
        cpu: 100m
        memory:  400M
  storage:
    globalStorageClassName: global-sc
    globalDataDirectory: /data/
    mongoDataDirectory: /data/mongo/data/
    mongoLogsDirectory: /data/mongo/logs/
    storageClassName: mongodb-sc
    dataStorageCapacityRequest: 8G
    logsStorageCapacityRequest: 8G
    dataVolumeLabel: mongo-data
    logsVolumeLabel: mongo-logs
    bkVolumeLabel: mongo-backups
    backupsDirectory: /data/backups/
    backupsStorageClassName: mongodb-bk

backups:
  databaseBackup1: WorkflowManager
  databaseBackup2: InformaticsGateway
  backupcron: "0 1 * * *"  # everyday at 1am
