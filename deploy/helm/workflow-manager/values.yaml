replicaCount: 3

image:
  repository: ghcr.io/project-monai/monai-deploy-workflow-manager

enviromentVariables:
  DOTNET_ENVIRONMENT: Production
  WorkflowManager__messaging__publisherSettings__endpoint: rabbitmq.rabbitmq
  WorkflowManager__messaging__subscriberSettings__endpoint: rabbitmq.rabbitmq
  WorkflowManager__messaging__publisherSettings__virtualHost: monaideploy
  WorkflowManager__messaging__subscriberSettings__virtualHost: monaideploy
  WorkflowManager__TaskManager__argoPluginArguments__server_url: http://argo-argo-workflows-server.argo:2746
  Kestrel__EndPoints__Http__Url: "http://::5000"
  WorkflowManager__storage__settings__executableLocation: "mc"
  MonaiDeployAuthentication__BypassAuthentication: "false"
  MonaiDeployAuthentication__basicAuth__userName: "monai"
  MonaiDeployAuthentication__basicAuth__password: "deploy"

enviromentVariablesFromSecrets:
  secrets:
    - name: WorkflowManager__messaging__subscriberSettings__username
      secretName: #{RabbitSecretName}
      secretKey: username
    - name: WorkflowManager__messaging__subscriberSettings__password
      secretName: #{RabbitSecretName}
      secretKey: password
    - name: WorkflowManager__messaging__publisherSettings__username
      secretName: #{RabbitSecretName}
      secretKey: username
    - name: WorkflowManager__messaging__publisherSettings__password
      secretName: #{RabbitSecretName}
      secretKey: password
    - name: WorkloadManagerDatabase__ConnectionString
      secretName: #{MongoMonaiUserSecretName}
      secretKey: connectionString.standard
    - name: WorkflowManager__storage__settings__endpoint
      secretName: minio-admin-user
      secretKey: connectionstring
    - name: WorkflowManager__storage__settings__accessKey
      secretName: minio-admin-user
      secretKey: user
    - name: WorkflowManager__storage__settings__accessToken
      secretName: minio-admin-user
      secretKey: password
service:
  type: NodePort
  port: 5000
  nodeport: 13051

serviceAccount:
  create: true
  name: mwm
  namespace: monai
  clusterrole:
    name: clusterrole-argo-secret-master
    rules:
      apiGroups: [""]
      resources: ["secrets"]
      verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

probes:
  path: /health
  port: 5000
  timeout: 5